<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .game-container {
            text-align: center;
        }
        h1 {
            color: #4ecca3;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(78, 204, 163, 0.5);
        }
        #gameCanvas {
            border: 3px solid #4ecca3;
            border-radius: 10px;
            background: #0f0f23;
            box-shadow: 0 0 20px rgba(78, 204, 163, 0.3);
        }
        .info {
            margin-top: 20px;
            color: #e8e8e8;
            font-size: 1.2rem;
        }
        .score {
            color: #4ecca3;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .controls {
            margin-top: 15px;
            color: #888;
            font-size: 0.9rem;
        }
        #restartBtn {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 1rem;
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        #restartBtn:hover {
            background: #3db892;
            transform: scale(1.05);
        }
        .game-over {
            color: #ff6b6b;
            font-size: 2rem;
            font-weight: bold;
            margin-top: 15px;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="info">
            分数: <span class="score" id="score">0</span>
        </div>
        <div id="gameOverText" class="game-over" style="display: none;">游戏结束!</div>
        <button id="restartBtn">重新开始</button>
        <div class="controls">
            方向键 或 WASD 控制方向
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverText = document.getElementById('gameOverText');
        const restartBtn = document.getElementById('restartBtn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameLoop;
        let gameSpeed = 100;
        let isGameOver = false;

        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreElement.textContent = score;
            gameOverText.style.display = 'none';
            isGameOver = false;
            placeFood();
        }

        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (subtle)
            ctx.strokeStyle = '#1a1a3a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw food
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw snake
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );
                
                if (index === 0) {
                    gradient.addColorStop(0, '#5dff9e');
                    gradient.addColorStop(1, '#4ecca3');
                } else {
                    gradient.addColorStop(0, '#4ecca3');
                    gradient.addColorStop(1, '#3db892');
                }
                
                ctx.fillStyle = gradient;
                ctx.shadowColor = '#4ecca3';
                ctx.shadowBlur = index === 0 ? 15 : 5;
                
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();
            });
            ctx.shadowBlur = 0;

            // Draw snake eyes
            const head = snake[0];
            ctx.fillStyle = '#1a1a2e';
            const eyeOffset = 4;
            if (direction.x === 1) {
                ctx.beginPath();
                ctx.arc(head.x * gridSize + gridSize - eyeOffset, head.y * gridSize + eyeOffset, 2, 0, Math.PI * 2);
                ctx.arc(head.x * gridSize + gridSize - eyeOffset, head.y * gridSize + gridSize - eyeOffset, 2, 0, Math.PI * 2);
                ctx.fill();
            } else if (direction.x === -1) {
                ctx.beginPath();
                ctx.arc(head.x * gridSize + eyeOffset, head.y * gridSize + eyeOffset, 2, 0, Math.PI * 2);
                ctx.arc(head.x * gridSize + eyeOffset, head.y * gridSize + gridSize - eyeOffset, 2, 0, Math.PI * 2);
                ctx.fill();
            } else if (direction.y === 1) {
                ctx.beginPath();
                ctx.arc(head.x * gridSize + eyeOffset, head.y * gridSize + gridSize - eyeOffset, 2, 0, Math.PI * 2);
                ctx.arc(head.x * gridSize + gridSize - eyeOffset, head.y * gridSize + gridSize - eyeOffset, 2, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.arc(head.x * gridSize + eyeOffset, head.y * gridSize + eyeOffset, 2, 0, Math.PI * 2);
                ctx.arc(head.x * gridSize + gridSize - eyeOffset, head.y * gridSize + eyeOffset, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function update() {
            if (isGameOver) return;

            direction = { ...nextDirection };
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                placeFood();
                // Speed up slightly
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }

        function gameStep() {
            update();
            draw();
        }

        function gameOver() {
            isGameOver = true;
            gameOverText.style.display = 'block';
            clearInterval(gameLoop);
        }

        function startGame() {
            initGame();
            clearInterval(gameLoop);
            gameSpeed = 100;
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        document.addEventListener('keydown', (e) => {
            if (isGameOver) return;

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
            e.preventDefault();
        });

        restartBtn.addEventListener('click', startGame);

        startGame();
    </script>
</body>
</html>
